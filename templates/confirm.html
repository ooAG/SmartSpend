<!DOCTYPE html>
<html lang="en">
<head>
    <title>Confirm Transaction</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8 font-sans text-gray-800">

<div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6 mt-10">
    <h2 class="text-2xl font-bold text-gray-900 mb-2">Review Transaction</h2>
    <p class="text-sm text-gray-500 mb-6">Edit any details the parser got wrong before saving.</p>

    <div class="bg-gray-50 p-3 rounded text-xs text-gray-600 mb-6 italic border border-gray-200">
        "{{ raw_sms }}"
    </div>

    <form action="/confirm_transaction" method="post" class="space-y-4">
        <input type="hidden" name="user_id" value="{{ user_id }}">

        <div>
            <label class="block text-sm font-medium text-gray-700">Amount (₹)</label>
            <input type="number" step="0.01" name="amount" value="{{ parsed.amount }}" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm border p-2 focus:ring-blue-500 focus:border-blue-500">
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Type</label>
                <select name="type" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm border p-2 bg-white">
                    <option value="debit" {% if parsed.type == 'debit' %}selected{% endif %}>Debit</option>
                    <option value="credit" {% if parsed.type == 'credit' %}selected{% endif %}>Credit</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Category</label>
                <input type="text" name="category" value="{{ category }}" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm border p-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">Merchant</label>
            <input type="text" name="merchant" value="{{ parsed.merchant }}" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm border p-2 focus:ring-blue-500 focus:border-blue-500">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">Notes (Optional)</label>
            <input type="text" name="notes" placeholder="e.g., Dinner with friends" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm border p-2 focus:ring-blue-500 focus:border-blue-500">
        </div>

        <div class="flex space-x-3 pt-4">
            <a href="/dashboard?user_id={{ user_id }}" class="w-full text-center bg-gray-200 text-gray-700 p-2 rounded-md hover:bg-gray-300 transition">Cancel</a>
            <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded-md hover:bg-blue-700 transition shadow-md">Save Transaction</button>
        </div>
    </form>
</div>

</body>
</html>
